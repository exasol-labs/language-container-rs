name: CI

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  # RAM guard for the ~8 GB runner: cap concurrent codegen units (peak rustc/
  # linker memory) rather than letting cargo fan out across all 8 cores; drop
  # release debuginfo (smaller, cheaper link); incremental is useless on a CI
  # cache and just inflates target/.
  CARGO_BUILD_JOBS: "4"
  CARGO_PROFILE_RELEASE_DEBUG: "0"
  CARGO_INCREMENTAL: "0"

jobs:
  # ── build early ──────────────────────────────────────────────────────────
  # Single job that compiles everything once and warms the shared cargo cache
  # for lint/unit-tests, and produces the release .so + IT binary artifacts the
  # integration matrix consumes. Everything else needs this (directly or
  # transitively), so the DAG reflects "build early".
  build:
    name: Build (warm cache + artifacts)
    runs-on: ubuntu-latest-8-cores
    steps:
      - uses: actions/checkout@v4

      # arrow 58 requires Cargo ≥ 1.85 to parse its edition2024 manifest.
      # The workspace pin (1.84) is for the artifact build; CI uses 1.91.
      - name: Install Rust 1.91
        uses: dtolnay/rust-toolchain@1.91
        with:
          components: clippy, rustfmt

      # Explicitly bind components to the +1.91 slot so they are visible when
      # rust-toolchain.toml (pinned to 1.84 for the artifact build) would
      # otherwise redirect bare `cargo` to the wrong toolchain.
      - name: Ensure rustfmt/clippy available on 1.91
        run: rustup component add rustfmt clippy --toolchain 1.91

      - name: Cache cargo registry and build artifacts
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target/
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      # Debug compile warms target/ for lint + unit-tests. This also builds the
      # dlopen fixtures (scalar-double / annotated-fixture / single-call-fixture)
      # that exa-udf-runtime's dispatch/single_call tests load at runtime.
      - name: Build workspace (debug, warm cache)
        run: |
          cargo +1.91 build \
            --exclude connect-back-query \
            --exclude connect-back-insert \
            --exclude it \
            --workspace

      - name: Build UDF .so artifacts (release)
        run: |
          cargo +1.91 build --release \
            -p scalar-double \
            -p set-filter \
            -p json-parse \
            -p single-call-fixture \
            -p connect-back-cluster-ip \
            -p connect-back-query \
            -p connect-back-insert \
            -p connect-back-crunch

      - name: Build IT test binary (compile once)
        run: |
          BIN=$(cargo +1.91 test --no-run -p it --features integration,db-2026-1 \
              --message-format=json 2>/dev/null \
            | jq -r 'select(.reason == "compiler-artifact" and (.target.kind | contains(["test"]))) | .executable' \
            | grep -v '^null$' | head -1)
          cp "$BIN" it-runner

      - name: Upload UDF .so artifacts
        uses: actions/upload-artifact@v4
        with:
          name: udf-libs
          path: target/release/lib*.so

      - name: Upload IT test binary
        uses: actions/upload-artifact@v4
        with:
          name: it-test
          path: it-runner

  # ── fan-out: lint / unit-tests / build-slc all need build ────────────────
  lint:
    name: Check & Lint
    runs-on: ubuntu-latest-8-cores
    needs: [build]
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust 1.91
        uses: dtolnay/rust-toolchain@1.91
        with:
          components: clippy, rustfmt

      - name: Ensure rustfmt/clippy available on 1.91
        run: rustup component add rustfmt clippy --toolchain 1.91

      - name: Cache cargo registry and build artifacts
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target/
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Check formatting
        run: cargo +1.91 fmt --all -- --check

      - name: Clippy
        # connect-back-query, connect-back-insert, and it require separate
        # handling (arrow 58 / testcontainers); they are checked in the
        # integration job.
        run: |
          cargo +1.91 clippy \
            --exclude connect-back-query \
            --exclude connect-back-insert \
            --exclude it \
            --workspace -- -D warnings

  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest-8-cores
    needs: [build]
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust 1.91
        uses: dtolnay/rust-toolchain@1.91

      - name: Cache cargo registry and build artifacts
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target/
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      # dispatch/single_call tests in exa-udf-runtime dlopen these .so fixtures
      # (cache hit after the build job).
      - name: Build test fixture cdylibs
        run: cargo +1.91 build -p scalar-double -p annotated-fixture -p single-call-fixture

      - name: Run unit tests
        run: |
          cargo +1.91 test \
            --exclude connect-back-query \
            --exclude connect-back-insert \
            --exclude it \
            --workspace

  licenses:
    name: License Check
    runs-on: ubuntu-latest-8-cores
    needs: [build]
    steps:
      - uses: actions/checkout@v4

      # cargo-deny shells out to `cargo metadata`; arrow 58's edition2024
      # manifests need Cargo ≥ 1.85, so run deny under +1.91 (the 1.84 pin
      # in rust-toolchain.toml cannot parse them).
      - name: Install Rust 1.91
        uses: dtolnay/rust-toolchain@1.91

      - name: Cache cargo registry and build artifacts
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target/
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Install cargo-deny
        uses: taiki-e/install-action@cargo-deny

      # MIT-compliance gate: every dependency must carry a license from the
      # allow-list in deny.toml (MIT + permissive-compatible). advisories check
      # enforces the RustSec DB with the documented, justified ignores.
      - name: Check licenses
        run: cargo +1.91 deny check licenses

      - name: Check advisories
        run: cargo +1.91 deny check advisories

  build-slc:
    name: Build SLC image
    runs-on: ubuntu-latest-8-cores
    needs: [build]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Build the SLC image but DO NOT push it to any registry. Load it into the
      # local daemon and hand it to downstream jobs as a GitHub Actions artifact.
      # (cache-to: type=gha is the Actions *build cache*, not a registry push.)
      - name: Build SLC image (no registry push)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.alpine
          push: false
          load: true
          tags: slc-rs-slim:dev
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Save SLC image as artifact
        run: docker save slc-rs-slim:dev -o slc-image.tar

      - name: Upload SLC image
        uses: actions/upload-artifact@v4
        with:
          name: slc-image
          path: slc-image.tar

  # ── viability gate: integration matrix over Exasol DB versions ───────────
  integration:
    name: IT (${{ matrix.exasol_version }})
    runs-on: ubuntu-latest-8-cores
    needs: [lint, licenses, unit-tests, build-slc]
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        include:
          - exasol_version: "2025.1.11"
            db_series: "2025-1"
          - exasol_version: "2025.2.1"
            db_series: "2025-2"
          - exasol_version: "2026.1.0"
            db_series: "2026-1"
    steps:
      # No checkout or Rust install needed: the IT binary and UDF .so files are
      # pre-compiled in the build job and downloaded below.
      - name: Download UDF .so artifacts
        uses: actions/download-artifact@v4
        with:
          name: udf-libs
          path: target/release/

      - name: Download IT test binary
        uses: actions/download-artifact@v4
        with:
          name: it-test

      - name: Download SLC image
        uses: actions/download-artifact@v4
        with:
          name: slc-image

      - name: Load SLC image
        run: docker load -i slc-image.tar

      # Cache the (multi-GB) Exasol DB image per matrix version so each leg
      # loads it from a tarball instead of re-pulling from Docker Hub every run.
      - name: Cache Exasol DB image
        id: exa-cache
        uses: actions/cache@v4
        with:
          path: /tmp/exasol-db-${{ matrix.exasol_version }}.tar
          key: exasol-db-${{ matrix.exasol_version }}

      - name: Load or pull Exasol image
        run: |
          TAR=/tmp/exasol-db-${{ matrix.exasol_version }}.tar
          if [ -f "$TAR" ]; then
            echo "Loading Exasol image from cache..."
            docker load -i "$TAR"
          else
            echo "Pulling Exasol image from registry..."
            docker pull exasol/docker-db:${{ matrix.exasol_version }}
            docker save exasol/docker-db:${{ matrix.exasol_version }} -o "$TAR"
          fi

      # Cache the exapump release binary per pinned version so each matrix leg
      # installs it from cache instead of re-downloading from GitHub releases
      # every run. Bump the key's version suffix when EXAPUMP_VERSION changes.
      - name: Cache exapump
        uses: actions/cache@v4
        with:
          path: ~/.cache/exapump
          key: exapump-v0.9.2

      - name: Install exapump
        env:
          EXAPUMP_VERSION: "0.9.2"
        run: |
          CACHED=~/.cache/exapump/exapump
          if [ ! -x "$CACHED" ]; then
            echo "exapump not in cache; downloading v${EXAPUMP_VERSION}..."
            mkdir -p ~/.cache/exapump
            curl -fsSL "https://github.com/exasol-labs/exapump/releases/download/v${EXAPUMP_VERSION}/exapump-${EXAPUMP_VERSION}-linux-x86_64" \
              -o "$CACHED"
            chmod +x "$CACHED"
          else
            echo "Using cached exapump."
          fi
          install -m 0755 "$CACHED" /usr/local/bin/exapump

      - name: Start Exasol ${{ matrix.exasol_version }}
        run: |
          # UDF execution ("VM crashed", SQL state 22002) fails only on the CI
          # runner — it does NOT reproduce locally even with --memory=6g and swap
          # disabled on a same-sized (32 GB, cgroup v2) host. So the cause is
          # runner-environment-specific, not the docker mem flags alone.
          # EXA_DB_MEM_SIZE: pin Exasol's DB RAM to 4 GiB (plenty for these tests)
          # instead of letting docker-db auto-size from the cgroup. This removes
          # reliance on auto-sizing, which may pick a pathological value on the
          # runner; it mirrors the working strata-rs / exarrow-rs setups.
          # --memory: generous ceiling on this ubuntu-latest-8-cores runner
          # (32 GB) — fits DB(4) + shm(2) + sandbox + OS. Replaces the previous
          # 6g cap (sized for a 7 GB runner); exarrow-rs sets no --memory at all.
          # --shm-size: the UDF script VM needs far more than Docker's 64 MB
          # default; 2g (exarrow-rs uses 1g but never spawns the UDF sandbox).
          # The "Dump Exasol logs on failure" step below captures the real
          # abort reason if this is still red.
          docker run -d --name exasol-db --privileged \
            --shm-size=2g \
            --memory=12g \
            -e EXA_DB_MEM_SIZE='4 GiB' \
            -e COSLWD_ENABLED=1 \
            -p 8563:8563 -p 2581:2581 \
            exasol/docker-db:${{ matrix.exasol_version }}

      - name: Wait for Exasol (exapump health probe)
        run: |
          echo "Waiting for Exasol to accept SQL connections..."
          for i in $(seq 1 60); do
            exapump sql \
              --dsn "exasol://sys:exasol@localhost:8563/?validateservercertificate=0" \
              "SELECT 1" && echo "Exasol is ready." && break
            echo "Attempt $i/60 failed; retrying in 5s..."
            sleep 5
          done

      - name: Extract BucketFS write password
        run: |
          BFSPASS=$(docker exec exasol-db bash -c "
            awk '/\[\[Bucket : default\]\]/{f=1} f && /WritePasswd/{print \$3; exit}' /exa/etc/EXAConf \
            | python3 -c 'import sys, base64; print(base64.b64decode(sys.stdin.read().strip()).decode())'
          ")
          echo "BUCKETFS_PASSWORD=$BFSPASS" >> "$GITHUB_ENV"

      - name: Run integration tests
        env:
          EXASOL_VERSION: ${{ matrix.exasol_version }}
          EXASOL_DB_SERIES: ${{ matrix.db_series }}
          EXASOL_HOST: localhost
          EXASOL_PORT: "8563"
          BUCKETFS_PORT: "2581"
        run: |
          chmod +x it-runner
          ./it-runner

      # On failure, capture the DB-side abort reason so a red run shows *why*
      # instead of just "VM crashed". An OOM-killed UDF sandbox shows up in
      # dmesg / the cored crash logs.
      - name: Dump Exasol logs on failure
        if: failure()
        run: |
          echo "=== container memory / host free ==="
          docker stats --no-stream exasol-db || true
          free -m || true
          echo "=== kernel OOM evidence ==="
          dmesg 2>/dev/null | grep -iE 'oom|killed process|out of memory' | tail -40 || true
          docker exec exasol-db sh -c 'dmesg 2>/dev/null | grep -iE "oom|killed process" | tail -40' || true
          echo "=== exasql crash logs ==="
          docker exec exasol-db sh -c 'find /exa/logs/cored -name "exasql.*" -type f 2>/dev/null | sort | xargs -I{} sh -c "echo === {} ===; tail -40 {}"' || true
          echo "=== EXASolution DB log tail ==="
          docker exec exasol-db sh -c 'tail -80 /exa/logs/logd/EXASolution_DB1.log 2>/dev/null' || true
          echo "=== collecting /exa/logs tree for artifact ==="
          rm -rf exa-logs && mkdir -p exa-logs
          docker cp exasol-db:/exa/logs exa-logs/ 2>/dev/null || true

      - name: Upload Exasol logs
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: exa-logs-${{ matrix.exasol_version }}
          path: exa-logs/
          if-no-files-found: ignore

      - name: Stop Exasol container
        if: always()
        run: |
          docker stop exasol-db || true
          docker rm   exasol-db || true

  # ── release: tag-only, gated on the full pipeline succeeding ─────────────
  release:
    name: Release
    runs-on: ubuntu-latest-8-cores
    needs: [integration]
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write   # GitHub Release + asset upload
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Verify tag matches Cargo.toml version
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          CRATE=$(grep -m1 '^version' Cargo.toml | sed 's/.*"\(.*\)"/\1/')
          if [ "$TAG" != "$CRATE" ]; then
            echo "tag $TAG != Cargo.toml version $CRATE"
            exit 1
          fi

      - name: Download SLC image
        uses: actions/download-artifact@v4
        with:
          name: slc-image

      # Produce the BucketFS-ready SLC: a flattened root filesystem (what Exasol
      # extracts and runs as /exaudf/exaudfclient), exactly as scripts/install.sh
      # builds it — `docker export` of a container, NOT `docker save` (which
      # yields OCI layers BucketFS cannot use).
      - name: Export SLC filesystem tarball
        run: |
          docker load -i slc-image.tar
          VER="${GITHUB_REF_NAME#v}"
          cid=$(docker create slc-rs-slim:dev)
          docker export "$cid" | gzip -c > "slc-rust-${VER}.tar.gz"
          docker rm "$cid"
          ls -la "slc-rust-${VER}.tar.gz"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          name: ${{ github.ref_name }}
          files: slc-rust-*.tar.gz
