name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  # RAM guard for the ~8 GB runner: cap concurrent codegen units (peak rustc/
  # linker memory) rather than letting cargo fan out across all 8 cores; drop
  # release debuginfo (smaller, cheaper link); incremental is useless on a CI
  # cache and just inflates target/.
  CARGO_BUILD_JOBS: "4"
  CARGO_PROFILE_RELEASE_DEBUG: "0"
  CARGO_INCREMENTAL: "0"

jobs:
  # ── build early ──────────────────────────────────────────────────────────
  # Single job that compiles everything once and warms the shared cargo cache
  # for lint/unit-tests, and produces the release .so + IT binary artifacts the
  # integration matrix consumes. Everything else needs this (directly or
  # transitively), so the DAG reflects "build early".
  build:
    name: Build (warm cache + artifacts)
    runs-on: ubuntu-latest-8-cores
    steps:
      - uses: actions/checkout@v4

      # The workspace, Docker builder, and CI all use a single unified toolchain: 1.92.
      - name: Install Rust 1.92
        uses: dtolnay/rust-toolchain@1.92
        with:
          components: clippy, rustfmt

      - name: Ensure rustfmt/clippy available on 1.92
        run: rustup component add rustfmt clippy --toolchain 1.92

      - name: Cache cargo registry and build artifacts
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target/
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      # Debug compile warms target/ for lint + unit-tests. This also builds the
      # dlopen fixtures (scalar-double / annotated-fixture / single-call-fixture)
      # that exa-udf-runtime's dispatch/single_call tests load at runtime.
      - name: Build workspace (debug, warm cache)
        run: |
          cargo build \
            --exclude it \
            --workspace

      - name: Build UDF .so artifacts (release)
        run: |
          cargo build --release \
            -p scalar-double \
            -p set-filter \
            -p json-parse \
            -p single-call-fixture \
            -p connect-back-cluster-ip \
            -p connect-back-query \
            -p connect-back-scalar \
            -p connect-back-insert \
            -p connect-back-crunch \
            -p resolv-udf

      - name: Build IT test binary (compile once)
        run: |
          BIN=$(cargo test --no-run -p it --features integration,db-2026-1 \
              --message-format=json 2>/dev/null \
            | jq -r 'select(.reason == "compiler-artifact" and (.target.kind | contains(["test"]))) | .executable' \
            | grep -v '^null$' | head -1)
          cp "$BIN" it-runner

      - name: Upload UDF .so artifacts
        uses: actions/upload-artifact@v4
        with:
          name: udf-libs
          path: target/release/lib*.so

      - name: Upload IT test binary
        uses: actions/upload-artifact@v4
        with:
          name: it-test
          path: it-runner

  # ── fan-out: lint / unit-tests / build-slc all need build ────────────────
  lint:
    name: Check & Lint
    runs-on: ubuntu-latest-8-cores
    needs: [build]
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust 1.92
        uses: dtolnay/rust-toolchain@1.92
        with:
          components: clippy, rustfmt

      - name: Ensure rustfmt/clippy available on 1.92
        run: rustup component add rustfmt clippy --toolchain 1.92

      - name: Cache cargo registry and build artifacts
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target/
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Clippy
        # it requires a live Exasol container; it is checked in the integration job.
        run: |
          cargo clippy \
            --exclude it \
            --workspace -- -D warnings

  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest-8-cores
    needs: [build]
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust 1.92
        uses: dtolnay/rust-toolchain@1.92

      - name: Cache cargo registry and build artifacts
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target/
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      # dispatch/single_call tests in exa-udf-runtime dlopen these .so fixtures
      # (cache hit after the build job).
      - name: Build test fixture cdylibs
        run: cargo build -p scalar-double -p annotated-fixture -p single-call-fixture

      - name: Run unit tests
        run: |
          cargo test \
            --exclude it \
            --workspace

  licenses:
    name: License Check
    runs-on: ubuntu-latest-8-cores
    needs: [build]
    steps:
      - uses: actions/checkout@v4

      # The workspace, Docker builder, and CI all use a single unified toolchain: 1.92.
      - name: Install Rust 1.92
        uses: dtolnay/rust-toolchain@1.92

      - name: Cache cargo registry and build artifacts
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target/
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Install cargo-deny
        uses: taiki-e/install-action@cargo-deny

      # MIT-compliance gate: every dependency must carry a license from the
      # allow-list in deny.toml (MIT + permissive-compatible). advisories check
      # enforces the RustSec DB with the documented, justified ignores.
      - name: Check licenses
        run: cargo deny check licenses

      - name: Check advisories
        run: cargo deny check advisories

      # The third-party attribution bundle shipped in lc-rs.tar.gz must stay in
      # sync with the exaudfclient dependency graph. Regenerate and fail if the
      # committed file is stale (cargo-about is pinned so output is reproducible).
      - name: Install cargo-about
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-about@0.9.0

      - name: Verify THIRD-PARTY-LICENSES.md is current
        run: |
          cargo about generate --manifest-path crates/exaudfclient/Cargo.toml \
            about.hbs -o /tmp/third-party.md
          if ! diff -q THIRD-PARTY-LICENSES.md /tmp/third-party.md >/dev/null; then
            echo "::error::THIRD-PARTY-LICENSES.md is stale. Regenerate with:"
            echo "  cargo about generate --manifest-path crates/exaudfclient/Cargo.toml about.hbs -o THIRD-PARTY-LICENSES.md"
            diff THIRD-PARTY-LICENSES.md /tmp/third-party.md || true
            exit 1
          fi

  build-slc:
    name: Build SLC image
    runs-on: ubuntu-latest-8-cores
    needs: [build]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Build the SLC artifact tarball (packager stage bakes the /conf resolver
      # symlinks; artifact stage exposes lc-rs.tar.gz for --output extraction).
      - name: Build SLC tarball (--target artifact)
        run: |
          mkdir -p /tmp/lc-out
          docker build -f Dockerfile.alpine --target artifact \
            --output type=local,dest=/tmp/lc-out .

      - name: Upload SLC tarball
        uses: actions/upload-artifact@v4
        with:
          name: lc-tarball
          path: /tmp/lc-out/lc-rs.tar.gz

  # ── viability gate: integration matrix over Exasol DB versions ───────────
  integration:
    name: IT (${{ matrix.exasol_version }})
    # Standard ubuntu-latest (2 vCPU / 7 GB) — enough since this job only boots
    # the DB + runs pre-built binaries, and the DB is pinned to 4 GiB (see
    # EXA_DB_MEM_SIZE below). The previous "VM crashed" failures were NOT about
    # runner size or kernel: they were Ubuntu 24.04's AppArmor restriction on
    # unprivileged user namespaces, which the "Allow unprivileged user
    # namespaces" step below disables. See that step for the full explanation.
    runs-on: ubuntu-latest
    needs: [lint, licenses, unit-tests, build-slc]
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        include:
          - exasol_version: "2025.1.11"
            db_series: "2025-1"
          - exasol_version: "2025.2.1"
            db_series: "2025-2"
          - exasol_version: "2026.1.0"
            db_series: "2026-1"
    steps:
      # Record the runner's host kernel/platform. The Exasol UDF sandbox crashes
      # on the el10 larger-runner kernel but works on the Azure-Ubuntu kernel of
      # the standard runner; this makes the platform visible in every run.
      - name: Runner environment
        run: |
          uname -a
          echo "--- /etc/os-release ---"; cat /etc/os-release || true
          echo "--- cpus/mem ---"; nproc; free -m

      # The standard runner has only ~21 GB free on / (where /var/lib/docker
      # lives) — too little for the multi-GB Exasol image + its cached tarball +
      # the SLC image + the DB's /exa data ("no space left on device" on docker
      # load). The larger runners have more disk but run the el10 kernel that
      # crashes the UDF sandbox, so we reclaim space instead: drop ~30 GB of
      # preinstalled toolchains we never use.
      - name: Free disk space
        run: |
          df -h /
          sudo rm -rf /usr/local/lib/android /usr/share/dotnet /opt/ghc \
            /usr/local/.ghcup /opt/hostedtoolcache/CodeQL \
            /usr/local/share/powershell /usr/share/swift /usr/lib/jvm || true
          sudo docker image prune -af || true
          echo "--- after cleanup ---"; df -h /

      # No checkout or Rust install needed: the IT binary and UDF .so files are
      # pre-compiled in the build job and downloaded below.
      - name: Download UDF .so artifacts
        uses: actions/download-artifact@v4
        with:
          name: udf-libs
          path: target/release/

      - name: Download IT test binary
        uses: actions/download-artifact@v4
        with:
          name: it-test

      - name: Download SLC tarball
        uses: actions/download-artifact@v4
        with:
          name: slc-tarball

      # Cache the (multi-GB) Exasol DB image per matrix version so each leg
      # loads it from a tarball instead of re-pulling from Docker Hub every run.
      - name: Cache Exasol DB image
        id: exa-cache
        uses: actions/cache@v4
        with:
          path: /tmp/exasol-db-${{ matrix.exasol_version }}.tar
          key: exasol-db-${{ matrix.exasol_version }}

      - name: Load or pull Exasol image
        run: |
          TAR=/tmp/exasol-db-${{ matrix.exasol_version }}.tar
          if [ -f "$TAR" ]; then
            echo "Loading Exasol image from cache..."
            docker load -i "$TAR"
          else
            echo "Pulling Exasol image from registry..."
            docker pull exasol/docker-db:${{ matrix.exasol_version }}
            docker save exasol/docker-db:${{ matrix.exasol_version }} -o "$TAR"
          fi

      # Cache the exapump release binary per pinned version so each matrix leg
      # installs it from cache instead of re-downloading from GitHub releases
      # every run. Bump the key's version suffix when EXAPUMP_VERSION changes.
      - name: Cache exapump
        uses: actions/cache@v4
        with:
          path: ~/.cache/exapump
          key: exapump-v0.9.2

      - name: Install exapump
        env:
          EXAPUMP_VERSION: "0.9.2"
        run: |
          CACHED=~/.cache/exapump/exapump
          if [ ! -x "$CACHED" ]; then
            echo "exapump not in cache; downloading v${EXAPUMP_VERSION}..."
            mkdir -p ~/.cache/exapump
            curl -fsSL "https://github.com/exasol-labs/exapump/releases/download/v${EXAPUMP_VERSION}/exapump-${EXAPUMP_VERSION}-linux-x86_64" \
              -o "$CACHED"
            chmod +x "$CACHED"
          else
            echo "Using cached exapump."
          fi
          install -m 0755 "$CACHED" /usr/local/bin/exapump

      # ROOT CAUSE of the persistent "VM crashed" (SQL state 22002) for every
      # UDF, incl. built-in Python3 — confirmed from the host kernel audit log:
      #   apparmor="DENIED" operation="capable" profile="unprivileged_userns"
      #   comm="nschroot" capability=21 capname="sys_admin"
      # To run a UDF, Exasol launches /opt/exasol/.../bin/udf/nschroot, which
      # creates an unprivileged user namespace and needs CAP_SYS_ADMIN inside it
      # to set up the sandbox. Ubuntu 24.04 ships
      # kernel.apparmor_restrict_unprivileged_userns=1, which transitions that
      # namespace into a restricted AppArmor profile that DENIES CAP_SYS_ADMIN —
      # even though the container is --privileged. So nschroot dies instantly and
      # silently (0-byte cored/exasql.* logs) and the DB reports "VM crashed".
      # The DB itself is healthy; only UDF execution is affected. Runs fine on
      # non-24.04 hosts (e.g. local Debian), which is why it's green locally.
      # Disabling the restriction on the runner restores the sandbox.
      - name: Allow unprivileged user namespaces (Exasol UDF sandbox)
        run: |
          sudo sysctl -w kernel.apparmor_restrict_unprivileged_userns=0
          sysctl kernel.apparmor_restrict_unprivileged_userns

      - name: Start Exasol ${{ matrix.exasol_version }}
        run: |
          # EXA_DB_MEM_SIZE: pin Exasol's DB RAM to 4 GiB so it fits comfortably
          # on the standard 7 GB runner (more than enough for these tests). No
          # --memory cgroup cap — exarrow-rs runs the DB uncapped on this same
          # runner class; pinning DB RAM is what bounds the footprint.
          # --shm-size: the UDF script VM needs far more than Docker's 64 MB
          # default; 2g (exarrow-rs uses 1g but never spawns the UDF sandbox).
          # COSLWD_ENABLED mirrors exarrow-rs.
          docker run -d --name exasol-db --privileged \
            --shm-size=2g \
            -e EXA_DB_MEM_SIZE='4 GiB' \
            -e COSLWD_ENABLED=1 \
            -p 8563:8563 -p 2581:2581 \
            exasol/docker-db:${{ matrix.exasol_version }}

      - name: Wait for Exasol (exapump health probe)
        run: |
          echo "Waiting for Exasol to accept SQL connections..."
          for i in $(seq 1 60); do
            exapump sql \
              --dsn "exasol://sys:exasol@localhost:8563/?validateservercertificate=0" \
              "SELECT 1" && echo "Exasol is ready." && break
            echo "Attempt $i/60 failed; retrying in 5s..."
            sleep 5
          done

      - name: Extract BucketFS write password
        run: |
          BFSPASS=$(docker exec exasol-db bash -c "
            awk '/\[\[Bucket : default\]\]/{f=1} f && /WritePasswd/{print \$3; exit}' /exa/etc/EXAConf \
            | python3 -c 'import sys, base64; print(base64.b64decode(sys.stdin.read().strip()).decode())'
          ")
          echo "BUCKETFS_PASSWORD=$BFSPASS" >> "$GITHUB_ENV"

      - name: Run integration tests
        env:
          SLC_TARBALL: lc-rs.tar.gz
          EXASOL_VERSION: ${{ matrix.exasol_version }}
          EXASOL_DB_SERIES: ${{ matrix.db_series }}
          EXASOL_HOST: localhost
          EXASOL_PORT: "8563"
          BUCKETFS_PORT: "2581"
        run: |
          chmod +x it-runner
          ./it-runner

      # On failure, capture the DB-side abort reason so a red run shows *why*
      # instead of just "VM crashed". An OOM-killed UDF sandbox shows up in
      # dmesg / the cored crash logs.
      - name: Dump Exasol logs on failure
        if: failure()
        run: |
          echo "=== container memory / host free ==="
          docker stats --no-stream exasol-db || true
          free -m || true
          echo "=== HOST kernel ring buffer (sudo) — the exaudfclient kill signal lands here ==="
          # The DB-side cored/exasql.* logs are 0 bytes: the script VM is killed
          # before it can log. The reason (seccomp/SIGSYS, SIGILL/invalid opcode,
          # segfault, OOM) is only in the host kernel log. Unprivileged dmesg is
          # blocked on the runner, so use sudo.
          sudo dmesg --ctime | grep -iE 'exaudf|seccomp|segfault|trap|invalid opcode|illegal|sig(sys|ill|segv|abrt)|signal [0-9]|killed process|oom|audit.*denied' | tail -60 || true
          echo "--- last 40 kernel lines (fallback) ---"
          sudo dmesg --ctime | tail -40 || true
          echo "=== exasql crash logs ==="
          docker exec exasol-db sh -c 'find /exa/logs/cored -name "exasql.*" -type f 2>/dev/null | sort | xargs -I{} sh -c "echo === {} ===; tail -40 {}"' || true
          echo "=== EXASolution DB log tail ==="
          docker exec exasol-db sh -c 'tail -80 /exa/logs/logd/EXASolution_DB1.log 2>/dev/null' || true
          echo "=== collecting /exa/logs tree for artifact ==="
          rm -rf exa-logs && mkdir -p exa-logs
          docker cp exasol-db:/exa/logs exa-logs/ 2>/dev/null || true

      - name: Upload Exasol logs
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: exa-logs-${{ matrix.exasol_version }}
          path: exa-logs/
          if-no-files-found: ignore

      - name: Stop Exasol container
        if: always()
        run: |
          docker stop exasol-db || true
          docker rm   exasol-db || true

  # ── release: on merge to main, gated on the full pipeline succeeding ─────
  # Auto-tags and releases when Cargo.toml's version was bumped (i.e. the
  # vX.Y.Z tag does not yet exist). Mirrors exasol-labs/exarrow-rs: the version
  # is the single source of truth — bump it in a PR, and merging cuts the tag +
  # GitHub Release. Already-released versions are a no-op (the tag-exists guard).
  release:
    name: Release
    runs-on: ubuntu-latest-8-cores
    needs: [integration]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: write   # create tag + GitHub Release + asset upload
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Derive version and tag from Cargo.toml
        id: version
        run: |
          VER=$(grep -m1 '^version' Cargo.toml | sed 's/.*"\(.*\)"/\1/')
          echo "version=$VER" >> "$GITHUB_OUTPUT"
          echo "tag=v$VER" >> "$GITHUB_OUTPUT"

      - name: Check whether the tag already exists
        id: check
        run: |
          if git rev-parse "v${{ steps.version.outputs.version }}" >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
            echo "v${{ steps.version.outputs.version }} already released — skipping."
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Download SLC tarball
        if: steps.check.outputs.exists == 'false'
        uses: actions/download-artifact@v4
        with:
          name: lc-tarball

      - name: Rename SLC tarball for release
        if: steps.check.outputs.exists == 'false'
        run: |
          VER="${{ steps.version.outputs.version }}"
          cp lc-rs.tar.gz "lc-rust-${VER}.tar.gz"
          ls -la "lc-rust-${VER}.tar.gz"

      - name: Create and push tag
        if: steps.check.outputs.exists == 'false'
        run: |
          git tag "${{ steps.version.outputs.tag }}"
          git push origin "${{ steps.version.outputs.tag }}"

      - name: Create GitHub Release
        if: steps.check.outputs.exists == 'false'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: ${{ steps.version.outputs.tag }}
          generate_release_notes: true
          files: lc-rust-*.tar.gz

      # Publish the customer-facing crates to crates.io, in dependency order.
      # `cargo publish` waits for each crate to appear on the index before
      # returning (cargo >=1.66), so the sequential sdk -> macros/cli order is safe
      # with no manual sleep. Each crate is skipped if its version is already on
      # the index, so re-runs are idempotent. Requires the CRATES_TOKEN secret;
      # if it is absent the step is a no-op (so the job doesn't fail before the
      # token is configured).
      - name: Install Rust toolchain
        if: steps.check.outputs.exists == 'false'
        uses: dtolnay/rust-toolchain@1.92

      - name: Publish public crates to crates.io
        if: steps.check.outputs.exists == 'false'
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CRATES_TOKEN }}
          VER: ${{ steps.version.outputs.version }}
        run: |
          set -euo pipefail
          if [ -z "${CARGO_REGISTRY_TOKEN:-}" ]; then
            echo "CRATES_TOKEN not set — skipping crates.io publish."
            exit 0
          fi
          publish() {
            crate="$1"
            if curl -sf -H "User-Agent: lc-rs-release/0.1" \
                 "https://crates.io/api/v1/crates/${crate}/${VER}" >/dev/null; then
              echo "${crate} ${VER} already on crates.io — skipping."
            else
              echo "Publishing ${crate} ${VER}…"
              cargo publish -p "${crate}"
            fi
          }
          publish exasol-udf-sdk
          publish exasol-udf-macros
          publish cargo-exasol-udf
