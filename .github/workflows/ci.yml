name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

jobs:
  check-and-lint:
    name: Check & Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # arrow 58 requires Cargo ≥ 1.85 to parse its edition2024 manifest.
      # The workspace pin (1.84) is for the artifact build; linting needs 1.91.
      - name: Install Rust 1.91
        uses: dtolnay/rust-toolchain@1.91
        with:
          components: clippy, rustfmt

      # Explicitly bind components to the +1.91 slot so they are visible when
      # rust-toolchain.toml (pinned to 1.84 for the artifact build) would
      # otherwise redirect bare `cargo` to the wrong toolchain.
      - name: Ensure rustfmt/clippy available on 1.91
        run: rustup component add rustfmt clippy --toolchain 1.91

      - name: Cache cargo registry and build artifacts
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target/
          key: ${{ runner.os }}-cargo-1.91-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-1.91-

      - name: Check formatting
        run: cargo +1.91 fmt --all -- --check

      - name: Clippy
        # connect-back-query, connect-back-insert, and it require separate
        # handling (arrow 58 / testcontainers); they are checked in the
        # integration job.
        run: |
          cargo +1.91 clippy \
            --exclude connect-back-query \
            --exclude connect-back-insert \
            --exclude it \
            --workspace -- -D warnings

  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust 1.91
        uses: dtolnay/rust-toolchain@1.91

      - name: Cache cargo registry and build artifacts
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target/
          key: ${{ runner.os }}-cargo-1.91-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-1.91-

      # dispatch/single_call tests in exa-udf-runtime dlopen these .so fixtures
      - name: Build test fixture cdylibs
        run: cargo +1.91 build -p scalar-double -p annotated-fixture -p single-call-fixture

      - name: Run unit tests
        run: |
          cargo +1.91 test \
            --exclude connect-back-query \
            --exclude connect-back-insert \
            --exclude it \
            --workspace

  build-slc:
    name: Build SLC image
    runs-on: ubuntu-latest-8-cores
    needs: [check-and-lint, unit-tests]
    permissions:
      packages: write
      contents: read
    outputs:
      slc_image: ${{ steps.meta.outputs.slc_image }}
    steps:
      - uses: actions/checkout@v4

      - name: Checkout exarrow-rs
        uses: actions/checkout@v4
        with:
          repository: exasol-labs/exarrow-rs
          path: exarrow-rs

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push SLC image
        uses: docker/build-push-action@v6
        with:
          context: .
          build-contexts: exarrow-rs=${{ github.workspace }}/exarrow-rs
          push: true
          tags: ghcr.io/exasol-labs/language-container-rs/slc:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Emit image tag
        id: meta
        run: echo "slc_image=ghcr.io/exasol-labs/language-container-rs/slc:${{ github.sha }}" >> "$GITHUB_OUTPUT"

  build-artifacts:
    name: Build UDF .so artifacts & IT binary
    runs-on: ubuntu-latest-8-cores
    needs: [check-and-lint, unit-tests]
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust 1.91
        uses: dtolnay/rust-toolchain@1.91

      # musl-tools provides musl-gcc for the custom musl-dylib target.
      # UDF crates are pure Rust (thiserror, serde_json, arrow-ipc — no zmq),
      # so no additional system libs are needed beyond the musl C runtime.
      - name: Install musl toolchain
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends musl-tools
          rustup component add rust-src --toolchain 1.91

      - name: Cache cargo registry and build artifacts
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target/
          key: ${{ runner.os }}-cargo-artifacts-1.91-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-artifacts-1.91-

      - name: Build musl UDF .so artifacts
        env:
          CARGO_TARGET_X86_64_UNKNOWN_LINUX_MUSL_DYLIB_LINKER: musl-gcc
          RUSTC_BOOTSTRAP: "1"
        run: |
          cargo +1.91 build --release \
            --target targets/x86_64-unknown-linux-musl-dylib.json \
            -p scalar-double \
            -p set-filter \
            -p json-parse \
            -p single-call-fixture \
            -p connect-back-cluster-ip \
            -p connect-back-query \
            -p connect-back-insert \
            -Z build-std=std,panic_abort

      - name: Build IT test binary (compile once)
        run: |
          BIN=$(cargo +1.91 test --no-run -p it --features integration \
              --message-format=json 2>/dev/null \
            | jq -r 'select(.reason == "compiler-artifact" and (.target.kind | contains(["test"]))) | .executable' \
            | grep -v '^null$' | head -1)
          cp "$BIN" it-runner

      - name: Upload UDF .so artifacts
        uses: actions/upload-artifact@v4
        with:
          name: udf-libs
          path: target/x86_64-unknown-linux-musl-dylib/release/lib*.so

      - name: Upload IT test binary
        uses: actions/upload-artifact@v4
        with:
          name: it-test
          path: it-runner

  integration:
    name: IT (${{ matrix.exasol_version }})
    runs-on: ubuntu-latest-8-cores
    needs: [build-slc, build-artifacts]
    timeout-minutes: 45
    permissions:
      packages: read
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - exasol_version: "2025.1.11"
            test_filter: "--skip connect_back"
          - exasol_version: "2025.2.1"
            test_filter: "--skip connect_back"
          - exasol_version: "2026.1.0"
            test_filter: ""
    steps:
      # No checkout or Rust install needed: the IT binary and UDF .so files are
      # pre-compiled in build-artifacts and downloaded below.
      - name: Download UDF .so artifacts
        uses: actions/download-artifact@v4
        with:
          name: udf-libs
          path: target/x86_64-unknown-linux-musl-dylib/release/

      - name: Download IT test binary
        uses: actions/download-artifact@v4
        with:
          name: it-test

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Pull and tag SLC image
        run: |
          docker pull ${{ needs.build-slc.outputs.slc_image }}
          docker tag  ${{ needs.build-slc.outputs.slc_image }} slc-rs-slim:dev

      - name: Install exapump
        run: |
          curl -fsSL https://github.com/exasol-labs/exapump/releases/download/v0.9.2/exapump-0.9.2-linux-x86_64 \
            -o /usr/local/bin/exapump
          chmod +x /usr/local/bin/exapump

      - name: Start Exasol ${{ matrix.exasol_version }}
        run: |
          docker run -d --name exasol-db --privileged \
            -p 8563:8563 -p 2581:2581 \
            exasol/docker-db:${{ matrix.exasol_version }}

      - name: Wait for Exasol (exapump health probe)
        run: |
          echo "Waiting for Exasol to accept SQL connections..."
          for i in $(seq 1 60); do
            exapump sql \
              --dsn "exasol://sys:exasol@localhost:8563/?validateservercertificate=0" \
              "SELECT 1" && echo "Exasol is ready." && break
            echo "Attempt $i/60 failed; retrying in 5s..."
            sleep 5
          done

      - name: Extract BucketFS write password
        run: |
          BFSPASS=$(docker exec exasol-db bash -c "
            awk '/\[\[Bucket : default\]\]/{f=1} f && /WritePasswd/{print \$3; exit}' /exa/etc/EXAConf \
            | python3 -c 'import sys, base64; print(base64.b64decode(sys.stdin.read().strip()).decode())'
          ")
          echo "BUCKETFS_PASSWORD=$BFSPASS" >> "$GITHUB_ENV"

      - name: Run integration tests
        env:
          EXASOL_VERSION: ${{ matrix.exasol_version }}
          EXASOL_HOST: localhost
          EXASOL_PORT: "8563"
          BUCKETFS_PORT: "2581"
        run: |
          chmod +x it-runner
          ./it-runner ${{ matrix.test_filter }}

      - name: Stop Exasol container
        if: always()
        run: |
          docker stop exasol-db || true
          docker rm   exasol-db || true
