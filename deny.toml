[advisories]
ignore = [
    # paste is unmaintained but not vulnerable. It's a transitive dependency from
    # parquet (Apache Arrow) - we can't control it. Track: https://github.com/apache/arrow-rs/issues
    { id = "RUSTSEC-2024-0436", reason = "Transitive dep from parquet, unmaintained but not vulnerable" },

    # CVE-2026-43868 / GHSA-2f9f-gq7v-9h6m — CWE-789, CVSS 5.3 Medium
    # Affects: thrift <0.23.0 (fix: THRIFT-5871, released in thrift 0.23.0)
    # Blocker 1: thrift 0.23.0 has not been published to crates.io (latest on crates.io: 0.17.0),
    #            so a `[patch.crates-io]` git override would be needed — but parquet's `^0.17`
    #            semver constraint blocks that path entirely.
    # Blocker 2: parquet 59.x removes the thrift dependency altogether
    #            (apache/arrow-rs#9962, merged 2026-05-13), which would resolve this advisory,
    #            but parquet 59.x has not yet been released to crates.io.
    # Blocker 3: adbc_core 0.23.0 caps at arrow-schema <59, which prevents upgrading to
    #            parquet 59.x even once it is released.
    # Re-evaluate when: parquet 59.x is released on crates.io AND adbc_core supports
    #                   arrow-schema >=59.
    { id = "GHSA-2f9f-gq7v-9h6m", reason = "Transitive dep via parquet/thrift; fix (thrift 0.23.0) not yet on crates.io; a [patch.crates-io] override is blocked by parquet's ^0.17 semver constraint; parquet 59.x (which drops thrift) is not yet released; re-evaluate when parquet 59.x and adbc_core arrow-schema >=59 are available" },
]

[licenses]
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Zlib",
    "0BSD",
    "Unlicense",
    "CC0-1.0",
    "BSL-1.0",
    "Unicode-3.0",
]
